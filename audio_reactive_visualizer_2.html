<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Audio Reactive Visualizer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&display=swap');

:root{
  --bg: #05060a;
  --panel: #12141c;
  --text: #e9e7e2;
  --muted: #7d8290;
  --accent: #2dd4bf;
  --line: #232634;
}

*{box-sizing:border-box;}
html,body{
  margin:0; padding:0; height:100%;
  background: var(--bg);
  color: var(--text);
  font-family:'Inter', sans-serif;
  overflow:hidden;
}

.stage{
  position:relative;
  width:100%; height:100vh;
}

canvas{
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  display:block;
}

.header{
  position:absolute; top:28px; left:0; right:0;
  text-align:center;
  z-index: 5;
  pointer-events:none;
}
.eyebrow{
  font-size:11px; letter-spacing:0.18em; text-transform:uppercase;
  color: var(--muted); margin:0 0 6px;
  text-shadow: 0 2px 12px rgba(0,0,0,0.6);
}
h1{
  font-family:'Space Grotesk', sans-serif;
  font-weight:700; font-size:20px; margin:0;
  letter-spacing:-0.01em;
  text-shadow: 0 2px 16px rgba(0,0,0,0.6);
}

.controls{
  position:absolute; bottom:28px; left:0; right:0;
  display:flex; flex-direction:column; align-items:center; gap:14px;
  z-index: 5;
}

.upload-row{ display:flex; gap:10px; align-items:center; }

.btn{
  font-family:'Inter', sans-serif;
  font-size:13px; font-weight:500;
  padding:10px 18px;
  border-radius:999px;
  border:1px solid var(--line);
  background: rgba(18,20,28,0.75);
  backdrop-filter: blur(8px);
  color: var(--text);
  cursor:pointer;
  transition: border-color .15s ease, transform .1s ease;
}
.btn:hover{ border-color: var(--accent); }
.btn:active{ transform: scale(0.97); }
.btn:disabled{ opacity:0.35; cursor:not-allowed; }

input[type=file]{ display:none; }

.track-name{
  font-size:12px; color: var(--muted);
  max-width: 320px; text-overflow:ellipsis; overflow:hidden; white-space:nowrap;
  text-shadow: 0 2px 8px rgba(0,0,0,0.6);
}

.hint{
  font-size:11px; color: var(--muted); text-align:center; margin-top:4px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.6);
}
</style>
</head>
<body>

<div class="stage">
  <canvas id="canvas"></canvas>

  <div class="header">
    <p class="eyebrow">Audio Reactive Visualizer</p>
    <h1 id="titleText">อัปโหลดเพลงเพื่อเริ่ม</h1>
  </div>

  <div class="controls">
    <div class="upload-row">
      <label class="btn" for="fileInput">เลือกไฟล์เพลง</label>
      <input type="file" id="fileInput" accept="audio/*">
      <button class="btn" id="playBtn" disabled>▶ เล่น</button>
    </div>
    <div class="track-name" id="trackName">ยังไม่ได้เลือกไฟล์</div>
    <div class="hint">เฉดสีของคลื่นทั้งหน้าจะไล่และผสมกันตามเบส/ความถี่ของเพลงที่เล่นอยู่</div>
  </div>
</div>

<audio id="audioEl" crossorigin="anonymous"></audio>

<script>
const fileInput = document.getElementById('fileInput');
const playBtn = document.getElementById('playBtn');
const audioEl = document.getElementById('audioEl');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const trackName = document.getElementById('trackName');
const titleText = document.getElementById('titleText');

let audioCtx, analyser, source, freqData, timeData;
let bassHistory = [];
let lastBeatTime = 0;
let beatFlash = 0;
let playing = false;

// color / wave flow state
let flowPhase = 0;
let smoothEnergy = 0;
let smoothBass = 0, smoothMid = 0, smoothTreble = 0;
let baseHue = 195;
let ripples = []; // {birth, hue}

function resizeCanvas(){
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function setupAudioGraph(){
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  source = audioCtx.createMediaElementSource(audioEl);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  freqData = new Uint8Array(analyser.frequencyBinCount);
  timeData = new Uint8Array(analyser.fftSize);
  source.connect(analyser);
  analyser.connect(audioCtx.destination);
}

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  audioEl.src = url;
  trackName.textContent = file.name;
  titleText.textContent = "พร้อมเล่น";
  playBtn.disabled = false;
  setupAudioGraph();
});

playBtn.addEventListener('click', () => {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (!playing){
    audioEl.play();
    playBtn.textContent = '⏸ หยุด';
    titleText.textContent = "กำลังเล่น";
  } else {
    audioEl.pause();
    playBtn.textContent = '▶ เล่น';
    titleText.textContent = "หยุดชั่วคราว";
  }
  playing = !playing;
});

audioEl.addEventListener('ended', () => {
  playing = false;
  playBtn.textContent = '▶ เล่น';
  titleText.textContent = "เล่นจบแล้ว";
});

function averageRange(arr, start, end){
  let sum = 0;
  for (let i = start; i < end; i++) sum += arr[i];
  return sum / (end - start);
}

function detectBeat(bass){
  bassHistory.push(bass);
  if (bassHistory.length > 40) bassHistory.shift();
  const avg = bassHistory.reduce((a,b) => a+b, 0) / bassHistory.length;
  const now = performance.now();
  const isBeat = bass > avg * 1.25 && bass > 25 && (now - lastBeatTime) > 220;
  if (isBeat){
    lastBeatTime = now;
    beatFlash = 1;
    ripples.push({ birth: now, hue: baseHue });
    if (ripples.length > 5) ripples.shift();
  }
  return isBeat;
}

// draws one flowing gradient wave band across the full width
function drawWaveLayer(w, h, opts){
  const { baseY, amp, speed, freq, hue1, hue2, alpha, phaseOffset } = opts;

  const grad = ctx.createLinearGradient(0, 0, w, 0);
  grad.addColorStop(0, `hsla(${hue1}, 70%, 55%, ${alpha})`);
  grad.addColorStop(0.5, `hsla(${(hue1+hue2)/2}, 75%, 60%, ${alpha})`);
  grad.addColorStop(1, `hsla(${hue2}, 70%, 55%, ${alpha})`);

  ctx.beginPath();
  ctx.moveTo(0, h);
  const step = 8;
  for (let x = 0; x <= w; x += step){
    const t = x / w;
    const y = baseY
      + Math.sin(t * freq * Math.PI * 2 + flowPhase * speed + phaseOffset) * amp
      + Math.sin(t * freq * 3.1 - flowPhase * speed * 0.7 + phaseOffset) * (amp * 0.35);
    ctx.lineTo(x, y);
  }
  ctx.lineTo(w, h);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();
}

function draw(){
  requestAnimationFrame(draw);

  const w = window.innerWidth, h = window.innerHeight;

  // fading trail for smooth motion blur
  ctx.fillStyle = 'rgba(5,6,10,0.22)';
  ctx.fillRect(0,0,w,h);

  if (!analyser){
    return;
  }

  analyser.getByteFrequencyData(freqData);
  analyser.getByteTimeDomainData(timeData);

  const bass = averageRange(freqData, 0, 10);
  const mid = averageRange(freqData, 10, 60);
  const treble = averageRange(freqData, 60, 128);

  smoothBass += (bass - smoothBass) * 0.15;
  smoothMid += (mid - smoothMid) * 0.15;
  smoothTreble += (treble - smoothTreble) * 0.15;

  const isBeat = detectBeat(bass);
  beatFlash *= 0.90;

  const energy = (bass + mid + treble) / (3 * 255);
  smoothEnergy += (energy - smoothEnergy) * 0.08;

  baseHue += 0.1 + smoothEnergy * 0.4;
  baseHue = baseHue % 360;

  flowPhase += 0.004 + smoothEnergy * 0.045;

  // layered wave bands, each colored by a hue derived from a different
  // frequency band so the whole gradient shifts and blends with the music
  const bassHue   = (baseHue) % 360;
  const midHue    = (baseHue + 60 + smoothMid/255 * 40) % 360;
  const trebleHue = (baseHue + 200 + smoothTreble/255 * 60) % 360;

  ctx.globalCompositeOperation = 'lighter';

  drawWaveLayer(w, h, {
    baseY: h * 0.72,
    amp: 40 + (smoothBass/255) * 90 + beatFlash * 40,
    speed: 0.8,
    freq: 1.4,
    hue1: bassHue, hue2: midHue,
    alpha: 0.22 + smoothEnergy * 0.15,
    phaseOffset: 0
  });

  drawWaveLayer(w, h, {
    baseY: h * 0.58,
    amp: 26 + (smoothMid/255) * 70 + beatFlash * 25,
    speed: 1.3,
    freq: 2.1,
    hue1: midHue, hue2: trebleHue,
    alpha: 0.18 + smoothEnergy * 0.12,
    phaseOffset: 2.1
  });

  drawWaveLayer(w, h, {
    baseY: h * 0.46,
    amp: 16 + (smoothTreble/255) * 50 + beatFlash * 15,
    speed: 2.0,
    freq: 3.0,
    hue1: trebleHue, hue2: bassHue,
    alpha: 0.14 + smoothEnergy * 0.1,
    phaseOffset: 4.3
  });

  ctx.globalCompositeOperation = 'source-over';

  // beat ripples: soft expanding radial blends of color across the whole screen
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const now = performance.now();
  ripples = ripples.filter(r => (now - r.birth) < 1600);
  for (const r of ripples){
    const age = (now - r.birth) / 1600;
    const radius = 60 + age * Math.max(w, h) * 0.9;
    const alpha = (1 - age) * 0.16;
    const band = ctx.createRadialGradient(w/2, h*0.6, Math.max(radius - 120, 0), w/2, h*0.6, radius);
    band.addColorStop(0, `hsla(${r.hue}, 75%, 60%, 0)`);
    band.addColorStop(0.75, `hsla(${r.hue}, 75%, 60%, ${alpha})`);
    band.addColorStop(1, `hsla(${r.hue}, 75%, 60%, 0)`);
    ctx.fillStyle = band;
    ctx.beginPath();
    ctx.arc(w/2, h*0.6, radius, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

draw();
</script>
</body>
</html>
