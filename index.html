<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Audio Reactive Visualizer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&display=swap');

:root{
  --bg: #05060a;
  --panel: #12141c;
  --text: #e9e7e2;
  --muted: #7d8290;
  --accent: #2dd4bf;
  --line: #232634;
}

*{box-sizing:border-box;}
html,body{
  margin:0; padding:0; height:100%;
  background: var(--bg);
  color: var(--text);
  font-family:'Inter', sans-serif;
  overflow:hidden;
}

.stage{
  position:relative;
  width:100%; height:100vh;
}

canvas{
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  display:block;
}

.header{
  position:absolute; top:28px; left:0; right:0;
  text-align:center;
  z-index: 5;
  pointer-events:none;
}
.eyebrow{
  font-size:11px; letter-spacing:0.18em; text-transform:uppercase;
  color: var(--muted); margin:0 0 6px;
  text-shadow: 0 2px 12px rgba(0,0,0,0.6);
}
h1{
  font-family:'Space Grotesk', sans-serif;
  font-weight:700; font-size:20px; margin:0;
  letter-spacing:-0.01em;
  text-shadow: 0 2px 16px rgba(0,0,0,0.6);
}

.controls{
  position:absolute; bottom:28px; left:0; right:0;
  display:flex; flex-direction:column; align-items:center; gap:14px;
  z-index: 5;
}

.upload-row{ display:flex; gap:10px; align-items:center; }
.preset-row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:center; }

.btn.preset.active{
  border-color: var(--accent);
  color: var(--accent);
}

.btn{
  font-family:'Inter', sans-serif;
  font-size:13px; font-weight:500;
  padding:10px 18px;
  border-radius:999px;
  border:1px solid var(--line);
  background: rgba(18,20,28,0.75);
  backdrop-filter: blur(8px);
  color: var(--text);
  cursor:pointer;
  transition: border-color .15s ease, transform .1s ease;
}
.btn:hover{ border-color: var(--accent); }
.btn:active{ transform: scale(0.97); }
.btn:disabled{ opacity:0.35; cursor:not-allowed; }

input[type=file]{ display:none; }

.track-name{
  font-size:12px; color: var(--muted);
  max-width: 320px; text-overflow:ellipsis; overflow:hidden; white-space:nowrap;
  text-shadow: 0 2px 8px rgba(0,0,0,0.6);
}

.hint{
  font-size:11px; color: var(--muted); text-align:center; margin-top:4px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.6);
}
</style>
</head>
<body>

<div class="stage">
  <canvas id="canvas"></canvas>

  <div class="header">
    <p class="eyebrow">Audio Reactive Visualizer</p>
    <h1 id="titleText">อัปโหลดเพลงเพื่อเริ่ม</h1>
  </div>

  <div class="controls">
    <div class="preset-row" id="presetRow"></div>
    <div class="upload-row">
      <label class="btn" for="fileInput">เลือกไฟล์เพลงเอง</label>
      <input type="file" id="fileInput" accept="audio/*">
      <button class="btn" id="playBtn" disabled>▶ เล่น</button>
    </div>
    <div class="track-name" id="trackName">ยังไม่ได้เลือกเพลง</div>
    <div class="hint">เฉดสีของคลื่นทั้งหน้าจะไล่และผสมกันตามเบส/ความถี่ของเพลงที่เล่นอยู่</div>
  </div>
</div>

<audio id="audioEl" crossorigin="anonymous"></audio>

<script>
const fileInput = document.getElementById('fileInput');
const playBtn = document.getElementById('playBtn');
const audioEl = document.getElementById('audioEl');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const trackName = document.getElementById('trackName');
const titleText = document.getElementById('titleText');
const presetRow = document.getElementById('presetRow');

// ---- default preset tracks ----
// วางไฟล์ mp3 เหล่านี้ไว้ "โฟลเดอร์เดียวกัน" กับไฟล์ HTML นี้
// ชื่อไฟล์ต้องตรงเป๊ะ (รวมช่องว่างและวงเล็บ)
const PRESET_TRACKS = [
  { label: 'Walen – Midnight Swing',  file: 'Walen - Midnight Swing (freetouse.com).mp3' },
  { label: 'Burgundy – Flicker',      file: 'Burgundy - Flicker (freetouse.com).mp3' },
];

function renderPresetButtons(){
  PRESET_TRACKS.forEach((track, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn preset';
    btn.textContent = track.label;
    btn.dataset.index = i;
    btn.addEventListener('click', () => loadPreset(i, btn));
    presetRow.appendChild(btn);
  });
}
renderPresetButtons();

function setActivePresetButton(activeBtn){
  presetRow.querySelectorAll('.btn.preset').forEach(b => b.classList.remove('active'));
  if (activeBtn) activeBtn.classList.add('active');
}

function loadPreset(index, btnEl){
  const track = PRESET_TRACKS[index];
  // encode each path segment so spaces / parentheses in the filename work as a URL
  audioEl.src = encodeURI(track.file);
  trackName.textContent = track.label;
  setActivePresetButton(btnEl);
  setupAudioGraph();
  playBtn.disabled = false;

  // this call happens inside a click handler, so browsers allow autoplay here
  if (audioCtx.state === 'suspended') audioCtx.resume();
  audioEl.play().then(() => {
    playing = true;
    playBtn.textContent = '⏸ หยุด';
    titleText.textContent = "กำลังเล่น";
  }).catch(() => {
    // some browsers still block it — fall back to asking for one manual play
    playing = false;
    playBtn.textContent = '▶ เล่น';
    titleText.textContent = "กดเล่นเพื่อเริ่ม";
  });
}

let audioCtx, analyser, source, freqData, timeData;
let bassHistory = [];
let lastBeatTime = 0;
let beatFlash = 0;
let playing = false;

// color / wave flow state
let flowPhase = 0;
let smoothEnergy = 0;
let smoothBass = 0, smoothMid = 0, smoothTreble = 0;
let baseHue = 195;
let ripples = []; // {birth, hue}

function resizeCanvas(){
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function setupAudioGraph(){
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  source = audioCtx.createMediaElementSource(audioEl);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  freqData = new Uint8Array(analyser.frequencyBinCount);
  timeData = new Uint8Array(analyser.fftSize);
  source.connect(analyser);
  analyser.connect(audioCtx.destination);
}

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  audioEl.src = url;
  trackName.textContent = file.name;
  titleText.textContent = "พร้อมเล่น";
  playBtn.disabled = false;
  setActivePresetButton(null);
  setupAudioGraph();
});

playBtn.addEventListener('click', () => {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (!playing){
    audioEl.play();
    playBtn.textContent = '⏸ หยุด';
    titleText.textContent = "กำลังเล่น";
  } else {
    audioEl.pause();
    playBtn.textContent = '▶ เล่น';
    titleText.textContent = "หยุดชั่วคราว";
  }
  playing = !playing;
});

audioEl.addEventListener('ended', () => {
  playing = false;
  playBtn.textContent = '▶ เล่น';
  titleText.textContent = "เล่นจบแล้ว";
});

function averageRange(arr, start, end){
  let sum = 0;
  for (let i = start; i < end; i++) sum += arr[i];
  return sum / (end - start);
}

function detectBeat(bass){
  bassHistory.push(bass);
  if (bassHistory.length > 40) bassHistory.shift();
  const avg = bassHistory.reduce((a,b) => a+b, 0) / bassHistory.length;
  const now = performance.now();
  const isBeat = bass > avg * 1.25 && bass > 25 && (now - lastBeatTime) > 220;
  if (isBeat){
    lastBeatTime = now;
    beatFlash = 1;
    ripples.push({ birth: now, hue: baseHue });
    if (ripples.length > 5) ripples.shift();
  }
  return isBeat;
}

// moving stage lights — each orbits the screen on its own lissajous path,
// pulses with a specific frequency band, and blends additively with the rest
const lights = [
  { fx: 0.6,  fy: 0.9,  px: 0.0, py: 1.3, band: 'bass',   hueOffset: 0   },
  { fx: 0.9,  fy: 0.5,  px: 2.1, py: 0.4, band: 'mid',    hueOffset: 130 },
  { fx: 0.4,  fy: 0.7,  px: 4.0, py: 2.7, band: 'treble', hueOffset: 260 },
  { fx: 1.1,  fy: 0.6,  px: 1.4, py: 3.6, band: 'bass',   hueOffset: 60  },
  { fx: 0.7,  fy: 1.0,  px: 3.3, py: 1.1, band: 'treble', hueOffset: 200 },
];

function drawLight(w, h, light, values){
  const t = flowPhase;
  const marginX = w * 0.28, marginY = h * 0.28;
  const cx = w/2 + Math.sin(t * light.fx + light.px) * marginX;
  const cy = h/2 + Math.cos(t * light.fy + light.py) * marginY;

  const bandVal = values[light.band]; // 0..255
  const level = bandVal / 255;
  const radius = h * (0.16 + level * 0.30) + beatFlash * h * 0.08;
  const hue = (baseHue + light.hueOffset) % 360;
  const alpha = 0.35 + level * 0.5;

  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
  grad.addColorStop(0,   `hsla(${hue}, 90%, 62%, ${alpha})`);
  grad.addColorStop(0.5, `hsla(${hue}, 85%, 50%, ${alpha * 0.5})`);
  grad.addColorStop(1,   `hsla(${hue}, 85%, 40%, 0)`);

  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.fill();
}

function draw(){
  requestAnimationFrame(draw);

  const w = window.innerWidth, h = window.innerHeight;

  // dark haze trail — short persistence so lights leave a soft smoky tail
  ctx.fillStyle = 'rgba(4,4,7,0.28)';
  ctx.fillRect(0,0,w,h);

  if (!analyser){
    return;
  }

  analyser.getByteFrequencyData(freqData);
  analyser.getByteTimeDomainData(timeData);

  const bass = averageRange(freqData, 0, 10);
  const mid = averageRange(freqData, 10, 60);
  const treble = averageRange(freqData, 60, 128);

  smoothBass += (bass - smoothBass) * 0.15;
  smoothMid += (mid - smoothMid) * 0.15;
  smoothTreble += (treble - smoothTreble) * 0.15;

  const isBeat = detectBeat(bass);
  beatFlash *= 0.88;

  const energy = (bass + mid + treble) / (3 * 255);
  smoothEnergy += (energy - smoothEnergy) * 0.08;

  baseHue += 0.15 + smoothEnergy * 0.5;
  baseHue = baseHue % 360;

  flowPhase += 0.006 + smoothEnergy * 0.05;

  const values = { bass: smoothBass, mid: smoothMid, treble: smoothTreble };

  ctx.globalCompositeOperation = 'lighter';
  for (const light of lights){
    drawLight(w, h, light, values);
  }
  ctx.globalCompositeOperation = 'source-over';

  // strobe: a quick bright flash across the whole screen on hard beats
  if (beatFlash > 0.05){
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = `hsla(${baseHue}, 60%, 85%, ${beatFlash * 0.12})`;
    ctx.fillRect(0, 0, w, h);
    ctx.restore();
  }

  // subtle vignette so edges stay dark like a club ceiling
  const vignette = ctx.createRadialGradient(w/2, h/2, h*0.2, w/2, h/2, h*0.75);
  vignette.addColorStop(0, 'rgba(0,0,0,0)');
  vignette.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, w, h);
}

draw();
</script>
</body>
</html>
